spring:
  datasource:
    url: jdbc:h2:file:./camunda-h2-database;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: false

camunda:
  bpm:
    admin-user:
      id: demo
      password: demo
      first-name: Demo
      last-name: User
    database:
      type: h2
      schema-update: true
    history-level: audit
    authorization:
      enabled: false
    generic-properties:
      properties:
        history-time-to-live: "P1D"
logging:
  level:
    org.camunda.bpm.engine: WARN
    com.example.workflow: INFO


# Actuator endpoints configuration - separate port to avoid security conflicts
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  server:
    port: 9000

# Health check configuration for Kubernetes probes
# Liveness and Readiness probe configuration
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      show-details: always
      show-components: always
      livenessstate:
        enabled: true
      readinessstate:
        enabled: true
  prometheus:
    access: unrestricted
